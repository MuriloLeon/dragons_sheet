<script>
     function exibirFichas() {
        JSON.parse(sessionStorage.FICHA).forEach(item => {
            document.getElementById("card_fichas").innerHTML += `
                <div class="card_acessar">
                   <button id="apagarFicha"></button>
                    <div class="titulo_fichas">
                        <p>${nomePersonagem}</p><p>${level}</p>
                    </div>
                    <div class="descri_fichas">
                        <p>Classe: ${classePersonagem}</p>
                        <p>Raça: ${racaPersonagem}</p>
                    </div>
                    <button class="btn_acessar-ficha">Acessar Ficha</button>
                </div>
                    `
        });
    }
</script>
