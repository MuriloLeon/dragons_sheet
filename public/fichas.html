  </div>

<script>
    window.onload = verFichas;

    function verFichas() {
        fetch(`/ficha/buscarFicha/${sessionStorage.ID_USUARIO}`, {
            method: "GET"
        })
        .then(resposta => resposta.json())
        .then(json => {
            sessionStorage.FICHA = JSON.stringify(json);
            exibirFichas(json);
        });

}

     function exibirFichas(fichas) {
        fichas.forEach(item => {
            document.getElementById("card_fichas").innerHTML += `
                <div class="card_acessar">
                   <button class="apagarFicha"></button>
                    <div class="titulo_fichas">
                        <p>${item.nome}</p><p>Nivel: ${item.nivel}</p>
                    </div>
                    <div class="descri_fichas">
                        <p>Classe: ${item.classe}</p>
                        <p>Raça: ${item.raca}</p>
                    </div>
                    <button class="btn_acessar-ficha">Acessar Ficha</button>
                </div>
                    `
        });
    }
</script>
