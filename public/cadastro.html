<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dragon's Sheet | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="icon" href="./assets/icon/favicon2.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>
    <div class="header">
    <div class="container">
      <h1 class="titulo">Sheet</h1>
      <ul class="navbar">
        <li>
          <a href="index.html">Home</a>
        </li>
        <li>
          <a href="fichas.html">Fichas</a>
        </li>
        <li>
          <a href="historico.html">Histórico das rolagens</a>
        </li>
        </ul>
      <ul class="navbar-entrar">
        <li>
          <a href="login.html">Entrar</a>
        </li>
      </ul>
    </div>

  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card card-cadastro">
        <h2>Seja bem-vindo!</h2>
        <div class="formulario">
          <div class="campo">
            <span>Nome de Usuário:</span>
            <input id="nome_input" type="text" placeholder="usuario" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="email@email.com" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmaçar Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <button class="botao" onclick='cadastrar()'>Cadastrar</button>
        </div>
        <a href="login.html">Já possui uma conta?</a>
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>
</body>

</html>

<script>

  function cadastrar() {
    aguardar();
    
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;

    if(nomeVar.length <= 1){
      console.log('nome')
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = `O nome deve conter pelo menos dois caracteres`
      finalizarAguardar();
      return;
    } else if(!emailVar.includes('@') || !emailVar.includes('.')){
      cardErro.style.display = "block";
      console.log('email')
      mensagem_erro.innerHTML = `Coloque o email corretamente`
      finalizarAguardar();
      return;
    } else if(senhaVar.length < 6){
      cardErro.style.display = "block";
      console.log('senha')
      mensagem_erro.innerHTML = `A senha deve conter pelo menos seis caracteres`
      finalizarAguardar();
      return;
    } else if(senhaVar != confirmacaoSenhaVar){
      cardErro.style.display = "block";
      console.log('confirmar senha')
      mensagem_erro.innerHTML = `Erro ao confirmar senha`
      finalizarAguardar();
      return;
    }

if (nomeVar == "" || emailVar == "" || senhaVar == "" || confirmacaoSenhaVar == "" ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
